% ----------------------------------------------------------------------
% SU2 configuration file for Assignment 2: 2D Axisymmetric Turbulent Jet
% ----------------------------------------------------------------------

SOLVER= RANS
KIND_TURB_MODEL= SA
MATH_PROBLEM= DIRECT
AXISYMMETRIC= YES

% Free-stream conditions (approx. Mach 0.05)
MACH_NUMBER= 0.05
AOA= 0.0
FREESTREAM_TEMPERATURE= 288.15
FREESTREAM_PRESSURE= 101325.0
REYNOLDS_NUMBER= 1E6
REYNOLDS_LENGTH= 1.0

% Boundary markers mapped from Gmsh
MARKER_SYM= ( MARKER_SYM )
MARKER_INLET= ( MARKER_INLET, 288.15, 105000.0, 1.0, 0.0, 0.0 )
MARKER_OUTLET= ( MARKER_OUTLET, 101325.0 )
MARKER_FAR= ( MARKER_FAR )
MARKER_EULER= ( MARKER_WALL )

% Numerical methods
NUM_METHOD_GRAD= GREEN_GAUSS
CONV_NUM_METHOD_FLOW= JST
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
CFL_NUMBER= 5.0

% Convergence limits
ITER= 500
CONV_RESIDUAL_MINVAL= -8

% Input/Output
MESH_FILENAME= jet.su2
MESH_FORMAT= SU2
OUTPUT_FILES= (RESTART, PARAVIEW_LEGACY, SURFACE_PARAVIEW)
TABULAR_FORMAT= CSV
SCREEN_OUTPUT= (INNER_ITER, WALL_TIME, RMS_DENSITY, RMS_NU_TILDE)
